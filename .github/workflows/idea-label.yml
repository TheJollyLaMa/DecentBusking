# .github/workflows/idea-label.yml
# DecentBusking Idea Adopted Label Workflow
#
# Allows maintainers to mark a Discussion or Issue as an adopted community idea
# and credit the originator for any future payout split.
#
# What it does:
#   1. Creates the "idea-adopted" label (purple, #7c3aed) if it doesn't exist.
#   2. Creates an "idea-credit: @<username>" label (teal, #0891b2) if it doesn't exist.
#   3. Applies both labels to the specified issue.
#   4. Posts a standardised credit announcement comment on the issue.
#
# On PR merge (handled by bounty-bot.yml), the bot reads the "idea-credit: @username"
# label to add a 20% ETH payout entry for the idea originator alongside the
# implementer's 80% entry.

name: Idea Adopted Label

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue/Discussion number to mark as idea-adopted (e.g. 1)"
        required: true
        type: string
      idea_credit_username:
        description: "GitHub username of the idea originator (e.g. octocat) — no @ symbol"
        required: true
        type: string
      major_feature:
        description: "Is this a major feature? (marks originator as eligible for Feature Originator DNFT)"
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  apply-idea-labels:
    name: Apply idea-adopted labels and post credit comment
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Apply labels and post adoption comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber     = parseInt('${{ github.event.inputs.issue_number }}', 10);
            const originatorLogin = '${{ github.event.inputs.idea_credit_username }}';
            const isMajor         = '${{ github.event.inputs.major_feature }}' === 'true';
            const approver        = context.actor;

            // ── 1. Ensure "idea-adopted" label exists ────────────────────────
            const adoptedLabel = 'idea-adopted';
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  adoptedLabel,
              });
              console.log(`Label "${adoptedLabel}" already exists.`);
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner:       context.repo.owner,
                  repo:        context.repo.repo,
                  name:        adoptedLabel,
                  color:       '7c3aed',
                  description: 'Community idea adopted for implementation',
                });
                console.log(`Created label "${adoptedLabel}".`);
              } else {
                throw e;
              }
            }

            // ── 2. Ensure "idea-credit: @<username>" label exists ────────────
            const creditLabel = `idea-credit: @${originatorLogin}`;
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  creditLabel,
              });
              console.log(`Label "${creditLabel}" already exists.`);
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner:       context.repo.owner,
                  repo:        context.repo.repo,
                  name:        creditLabel,
                  color:       '0891b2',
                  description: `Idea credit for @${originatorLogin}`,
                });
                console.log(`Created label "${creditLabel}".`);
              } else {
                throw e;
              }
            }

            // ── 3. Apply both labels to the issue ────────────────────────────
            await github.rest.issues.addLabels({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              labels:       [adoptedLabel, creditLabel],
            });
            console.log(`Applied labels "${adoptedLabel}" and "${creditLabel}" to issue #${issueNumber}.`);

            // ── 4. Post adoption announcement comment ────────────────────────
            const dnftLine = isMajor
              ? `| 🎖️ DNFT Eligible | **Yes** — Feature Originator DNFT will be minted on merge |`
              : null;

            const body = [
              `✅ **Idea Adopted!** This community idea has been marked for implementation by @${approver}.`,
              '',
              `| | |`,
              `|---|---|`,
              `| 💡 Idea Originator | @${originatorLogin} |`,
              `| 🏷️ Status | \`idea-adopted\` |`,
              `| 💰 Credit Split | **20% ETH** to idea originator · **80% ETH** to implementer |`,
              dnftLine,
              '',
              `**What happens next:**`,
              `1. A contributor will be assigned to implement this idea.`,
              `2. When their PR is merged, the payout is **automatically split**: 20% goes to @${originatorLogin} (you!) and 80% goes to the implementer.`,
              isMajor ? `3. As a major feature, a **Feature Originator DNFT** will be minted and sent to your wallet via the admin Payroll panel after merge.` : null,
              '',
              `> 💡 @${originatorLogin} — if you are not yet registered in the contributor whitelist, contact \`@TheJollyLaMa\` to complete onboarding and register your Optimism Mainnet wallet address so your ETH payout can be processed.`,
            ].filter(l => l !== null).join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: issueNumber,
              body,
            });
            console.log(`Idea adoption comment posted on issue #${issueNumber} — crediting @${originatorLogin}${isMajor ? ' (major feature — DNFT eligible)' : ''}.`);
