# .github/workflows/setup-branch-protection.yml
#
# Configures branch-protection rules for `main` via the GitHub REST API.
#
# Run this once (or re-run after any accidental reset) via:
#   Actions → Setup Branch Protection → Run workflow
#
# Required secret: ADMIN_PAT — a Personal Access Token with `repo` scope,
# owned by @TheJollyLaMa, stored as a repository secret.
# (The default GITHUB_TOKEN cannot modify branch-protection rules.)

name: Setup Branch Protection

on:
  workflow_dispatch:

jobs:
  protect-main:
    name: Apply branch-protection rules to main
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Apply branch-protection rules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const branch = 'main';

            await github.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch,
              // Require the payroll-queue validation check to pass before merging.
              required_status_checks: {
                strict: true,
                contexts: ['Validate Payroll Queue / Validate payroll-queue.json'],
              },
              // Enforce rules for admins too — even @TheJollyLaMa must use a PR.
              enforce_admins: true,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                require_code_owner_reviews: true,
                required_approving_review_count: 1,
              },
              restrictions: {
                users: ['TheJollyLaMa'],
                teams: [],
                apps: [],
              },
              required_linear_history: false,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false,
              required_conversation_resolution: false,
            });

            core.info(`✅  Branch-protection rules applied to ${owner}/${repo}:${branch}`);
            core.info('    • Require PR with at least 1 approval');
            core.info('    • Require CODEOWNER review');
            core.info('    • Dismiss stale reviews on new commits');
            core.info('    • Restrict pushers to @TheJollyLaMa');
            core.info('    • Block force-pushes and branch deletion');
